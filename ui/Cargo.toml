[package]
name = "nertsio_ui"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
nertsio_textures = { path = "../textures" }
nertsio_types = { path = "../types" }
macroquad = { git = "https://github.com/vpzomtrrfrt/macroquad", rev = "04de8a" }
tokio = { version = "1.14.0", features = ["rt-multi-thread", "sync", "fs", "io-util"] }
async-bincode = "0.6.1"
quinn = "0.8.0"
anyhow = "1.0.51"
rustls = { version = "0.20.2", features = ["dangerous_configuration"] }
futures-util = { version = "0.3.18", features = ["sink"] }
bincode = "1.3.3"
lexical = { version = "6.0.1", features = ["radix"] }
hyper = { version = "0.14.15", features = ["client", "http1", "tcp"] }
serde_json = "1.0.72"
serde = "1.0.131"
dirs = "4.0.0"
