[package]
name = "nertsio_ui"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
nertsio_textures = { path = "../textures" }
nertsio_types = { path = "../types" }
macroquad = { git = "https://github.com/vpzomtrrfrt/macroquad", rev = "f8d4039" }
anyhow = "1.0.51"
rustls = { version = "0.20.2", features = ["dangerous_configuration"] }
futures-util = { version = "0.3.18", features = ["sink"] }
bincode = "1.3.3"
lexical = { version = "6.0.1", features = ["radix"] }
serde_json = "1.0.72"
serde = "1.0.131"
dirs = "4.0.0"
nertsio_ui_metrics = { path = "../ui_metrics" }
futures-channel = "0.3.21"
reqwest = { version = "0.11.9", features = ["json"] }
wasm-timer = "0.2.5"

[target.'cfg(not(target_family = "wasm"))'.dependencies]
quinn = "0.8.0"
tokio = { version = "1.14.0", features = ["rt-multi-thread", "sync", "fs", "io-util"] }
async-bincode = "0.6.1"

[target.'cfg(target_family = "wasm")'.dependencies]
getrandom = { version = "0.2.3", features = ["js"] }
wasm-sockets = { git = "https://github.com/vpzomtrrfrt/wasm-sockets", rev = "d4ac143" }
wasm-bindgen-futures = "0.4.29"
console_error_panic_hook = "0.1.7"
web-sys = { version = "0.3.56", features = ["Window", "Storage"] }
